<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <title>Alke Wallet - Login</title>
</head>
<body>
  <div class="container">
    <div class="app-container text-center mt-5">
      <h3 class="font-weight-bold mb-4">Alke Wallet</h3>
      <form id="loginForm" class="text-left">
        <div class="form-group">
          <label for="username" class="font-weight-bold">Usuario</label>
          <input type="text" id="username" class="form-control" placeholder="admin" required>
        </div>
        <div class="form-group mb-2">
          <label for="password" class="font-weight-bold">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="12345" required>
        </div>
        
        <div class="text-center mb-4" style="font-size: 0.85rem; color: #6c757d;">
          Para pruebas usar el usuario: <strong style="color: #0A2540;">admin</strong> y contraseña: <strong style="color: #0A2540;">12345</strong>
        </div>

        <button type="submit" class="btn btn-bancario btn-envio btn-block">Iniciar Sesión</button>
      </form>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
