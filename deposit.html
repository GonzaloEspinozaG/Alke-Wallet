<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <title>Alke Wallet - Depositar</title>
</head>
<body>
  <div class="container">
    <div class="app-container mt-5">
      <h3 class="text-center font-weight-bold mb-4 text-success">Depositar Fondos</h3>
      <form id="depositForm" class="mb-4">
        <div class="form-group">
          <label for="depositAmount" class="font-weight-bold">Monto a depositar ($)</label>
          <input type="number" class="form-control form-control-lg" id="depositAmount" placeholder="Ej: 5000" min="1" required>
        </div>
        <button type="submit" class="btn btn-bancario btn-deposito btn-block mt-4">Confirmar Depósito</button>
      </form>
      <a href="menu.html" class="btn btn-outline-secondary btn-bancario btn-block font-weight-bold">Volver al Menú</a>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
