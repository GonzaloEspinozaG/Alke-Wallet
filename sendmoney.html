<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <title>Alke Wallet - Enviar Dinero</title>
</head>
<body>
  <div class="container">
    <div class="app-container mt-4">
      <h3 class="text-center font-weight-bold mb-4 text-primary">Enviar Dinero</h3>
      <form id="sendMoneyForm" class="mb-4">
        <div class="form-group">
          <label for="searchContact" class="font-weight-bold">Destinatario</label>
          <input type="text" class="form-control" id="searchContact" placeholder="Buscar o seleccionar..." required>
        </div>
        <div class="form-group">
          <label for="sendAmount" class="font-weight-bold">Monto a enviar ($)</label>
          <input type="number" class="form-control form-control-lg" id="sendAmount" placeholder="Monto" min="1" required>
        </div>
        <button type="submit" class="btn btn-bancario btn-envio btn-block mt-4">Transferir</button>
      </form>
      <h5 class="font-weight-bold mt-4">Agenda</h5>
      <ul id="contactList" class="list-group mb-4" style="max-height: 150px; overflow-y: auto;">
      </ul>
      <form id="addContactForm" class="mb-4 border-top pt-3">
        <div class="input-group">
          <input type="text" id="newContactName" class="form-control" placeholder="Nuevo contacto..." required>
          <div class="input-group-append">
            <button type="submit" class="btn btn-dark font-weight-bold">Añadir</button>
          </div>
        </div>
      </form>
      <a href="menu.html" class="btn btn-outline-secondary btn-bancario btn-block font-weight-bold">Volver al Menú</a>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
